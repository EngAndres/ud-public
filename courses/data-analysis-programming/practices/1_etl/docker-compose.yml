version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  env_file:
    - .env
  environment:
    # Airflow core
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__FERNET_KEY: ""
    # Use PostgreSQL for Airflow metadata
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${AIRFLOW_DB}
    # Connection for the EarthShake application database (used by DAGs)
    # Scheme must be 'postgres' (Airflow hook type), not 'postgresql+psycopg2' (SQLAlchemy)
    AIRFLOW_CONN_POSTGRES_ES: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${ES_DB}
    # Webserver
    AIRFLOW__WEBSERVER__SECRET_KEY: "nasa-es-etl-secret-key"
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/sql:/opt/airflow/sql
    - ./datalake:/opt/airflow/datalake
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ─────────────────────────────────────────────
  # PostgreSQL — hosts both airflow DB and es_db
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Init script creates the es_db alongside the airflow DB
      - ./airflow/sql/init_es_db.sql:/docker-entrypoint-initdb.d/init_es_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${AIRFLOW_DB}"]
      interval: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # Airflow Init — one-shot: migrate DB + create admin user
  # ─────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install --no-cache-dir /opt/airflow/ &&
        airflow db migrate &&
        airflow users create \
          --username "$${AIRFLOW_ADMIN_USER}" \
          --password "$${AIRFLOW_ADMIN_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$${AIRFLOW_ADMIN_EMAIL}" || true
    working_dir: /opt/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/sql:/opt/airflow/sql
      - ./datalake:/opt/airflow/datalake
      - ./pyproject.toml:/opt/airflow/pyproject.toml
    restart: "no"

  # ─────────────────────────────────────────────
  # Airflow Webserver — UI at http://localhost:8080
  # ─────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: bash -c "pip install --no-cache-dir /opt/airflow/ && airflow webserver"
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/sql:/opt/airflow/sql
      - ./datalake:/opt/airflow/datalake
      - ./pyproject.toml:/opt/airflow/pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      retries: 10
    restart: always

  # ─────────────────────────────────────────────
  # Airflow Scheduler — runs DAGs
  # ─────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: bash -c "pip install --no-cache-dir /opt/airflow/ && airflow scheduler"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/sql:/opt/airflow/sql
      - ./datalake:/opt/airflow/datalake
      - ./pyproject.toml:/opt/airflow/pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    restart: always

volumes:
  postgres_data:
